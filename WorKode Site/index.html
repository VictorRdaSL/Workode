<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workode - Entrar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/faviconwk.png">
</head>
<body>

    <header class="header">
        <div class="header-logo-pi">
            <a href="home.html"><img src="assets/header-logo-pi.png" class="header-logo-pi" /></a>
        </div>
    </header>

    <main class="main-container">
        
        <section class="login-box">
            <h2>Entrar</h2>
            
            <form>
                <div class="input-group">
                    <label for="email">E-mail corporativo</label>
                    <input type="email" id="email">
                </div>
                
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password">
                </div>
                
                <a href="#" class="forgot-password">Esqueci minha senha</a>
                
                <a href="dashboard.html" class="btn-submit">Entrar</a>
            </form>
            
            <p class="signup-text">Não tem conta? <a href="solicite-acesso.html">Cadastre sua empresa</a></p>
        </section>

        <section class="image-container" style="width: 900px;">
            <img src="assets/usando-pc.avif" alt="Pessoa trabalhando em home office">
        </section>

    </main>

    <footer class="footer">
        <p><strong>Workode</strong> ©2026.</p>
        <p>Todos os direitos reservados.</p>
        <p>Desenvolvido por Workode.</p>
    </footer>

</body>
</html>
