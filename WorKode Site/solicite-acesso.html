<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workode - Solicite Acesso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/faviconwk.png">
</head>

<body>

    <header class="header">
        <div class="header-logo-pi">
            <a href="home.html"><img src="assets/header-logo-pi.png" class="header-logo-pi" /></a>
        </div>
    </header>

    <main class="main-container">
        
        <section class="image-container">
            <img src="assets/imagem-notebook1.avif" alt="Pessoa a utilizar um notebook">
        </section>

        <section class="login-box">
            <div class="form-header">
                <h2>Solicite Acesso</h2>
                <p class="subtitle">Preencha o formulário e entraremos em contato</p>
            </div>
            
            <form>
                <div class="input-group">
                    <label for="email">E-mail corporativo*</label>
                    <input type="email" id="email">
                </div>

                <div class="input-group">
                    <label for="empresa">Nome da empresa*</label>
                    <input type="text" id="empresa">
                </div>
                
                <div class="input-group">
                    <label for="password">Senha*</label>
                    <input type="password" id="password">
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirmação de Senha*</label>
                    <input type="password" id="confirm-password">
                </div>

                <div class="input-group">
                    <label for="cnpj">CNPJ*</label>
                    <input type="text" id="cnpj">
                </div>
                
                <a href="dashboard.html" class="btn-submit">Solicitar Acesso</a>
            </form>
        </section>

    </main>

    <footer class="footer">
        <p><strong>Workode</strong> ©2026.</p>
        <p>Todos os direitos reservados.</p>
        <p>Desenvolvido por Workode.</p>
    </footer>

</body>
</html>
